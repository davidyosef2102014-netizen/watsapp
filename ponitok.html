<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ponitok</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23ff7f00'/><text y='.9em' font-size='80' x='10'>🐴</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root{--orange:#ff7f00;--orange-dark:#e67300;--bg:#1a1a1a;--card:#2a2a2a;--card2:#333;--text:#f0f0f0;--text2:#aaa;--border:#444}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh}
    .hidden{display:none!important}

    /* AUTH */
    .auth-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9000}
    .auth-box{background:var(--card);padding:40px;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.6);width:360px;text-align:center}
    .auth-logo{font-size:2.8rem;font-weight:900;color:var(--orange);margin-bottom:6px}
    .auth-sub{color:var(--text2);font-size:14px;margin-bottom:24px}
    .auth-input{width:100%;padding:13px 16px;margin-bottom:12px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-size:15px;outline:none;transition:border-color .2s}
    .auth-input:focus{border-color:var(--orange)}
    .auth-btn{width:100%;padding:13px;background:var(--orange);color:white;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:background .2s}
    .auth-btn:hover{background:var(--orange-dark)}
    .auth-err{color:#ff5252;font-size:13px;margin-bottom:8px;min-height:18px}

    /* NAVBAR */
    .navbar{background:var(--card);padding:0 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1000;box-shadow:0 2px 8px rgba(0,0,0,.5);height:56px}
    .logo{color:var(--orange);font-size:1.6rem;font-weight:900}
    .nav-search{background:var(--bg);border-radius:20px;padding:7px 14px;display:flex;align-items:center;gap:8px;width:240px}
    .nav-search input{border:none;outline:none;background:none;color:var(--text);font-size:14px;flex:1}
    .nav-search input::placeholder{color:var(--text2)}
    .nav-icons{display:flex;align-items:center;gap:4px}
    .nav-btn{width:40px;height:40px;border-radius:50%;background:var(--bg);border:none;color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .nav-btn:hover{background:var(--border);color:var(--orange)}
    .nav-avatar{width:36px;height:36px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:white;cursor:pointer;flex-shrink:0}

    /* LAYOUT */
    .app-layout{display:flex;max-width:1100px;margin:0 auto;padding:20px 12px;gap:20px}
    .sidebar-left,.sidebar-right{width:240px;flex-shrink:0;position:sticky;top:76px;height:fit-content}
    .feed{flex:1;max-width:580px}

    /* SIDEBAR */
    .sidebar-card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:16px}
    .sidebar-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:background .15s;font-size:15px}
    .sidebar-item:hover,.sidebar-item.active{background:var(--bg)}
    .sidebar-item.active{color:var(--orange);font-weight:600}
    .sidebar-item i{font-size:18px;color:var(--orange);width:22px;text-align:center}
    .sidebar-title{font-size:12px;color:var(--text2);font-weight:700;padding:6px 12px 4px;text-transform:uppercase;letter-spacing:.5px}

    /* CREATE POST */
    .create-post{background:var(--card);border-radius:12px;padding:16px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.3)}
    .cp-top{display:flex;align-items:center;gap:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
    .cp-avatar{width:42px;height:42px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;color:white;flex-shrink:0}
    .cp-textarea{width:100%;background:var(--bg);border:none;border-radius:10px;padding:11px 14px;color:var(--text);font-size:15px;outline:none;resize:none;min-height:70px;font-family:inherit;margin-top:12px}
    .cp-textarea:focus{outline:2px solid var(--orange)}
    .cp-placeholder{flex:1;background:var(--bg);border:none;border-radius:22px;padding:11px 16px;color:var(--text2);font-size:15px;cursor:pointer}
    .cp-actions{display:flex;justify-content:space-around;padding-top:12px}
    .cp-action{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--text2);cursor:pointer;padding:8px 12px;border-radius:8px;font-size:14px;font-weight:600;transition:background .15s}
    .cp-action:hover{background:var(--bg)}
    .cp-action.photo i{color:#45bd62}.cp-action.video i{color:#f3425f}.cp-action.feel i{color:#f7b928}
    .cp-submit{width:100%;background:var(--orange);color:white;border:none;border-radius:8px;padding:11px;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;transition:background .2s}
    .cp-submit:hover{background:var(--orange-dark)}

    /* POST */
    .post{background:var(--card);border-radius:12px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.3);overflow:hidden}
    .post-header{display:flex;align-items:center;gap:10px;padding:14px 16px}
    .post-av{width:42px;height:42px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:white;flex-shrink:0}
    .post-author{font-weight:700;font-size:15px}
    .post-time{font-size:12px;color:var(--text2);margin-top:2px}
    .post-body{padding:0 16px 12px;font-size:15px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
    .post-stats{display:flex;justify-content:space-between;padding:6px 16px;font-size:13px;color:var(--text2);border-top:1px solid var(--border)}
    .post-footer{display:flex;border-top:1px solid var(--border)}
    .post-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:none;border:none;color:var(--text2);cursor:pointer;padding:10px 6px;font-size:14px;font-weight:600;transition:background .15s}
    .post-btn:hover{background:var(--bg)}.post-btn.liked{color:var(--orange)}
    .comments-box{padding:12px 16px;border-top:1px solid var(--border)}
    .comment-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .comment-input{flex:1;background:var(--bg);border:none;border-radius:20px;padding:9px 14px;color:var(--text);font-size:14px;outline:none}
    .comment-input:focus{outline:2px solid var(--orange)}
    .comment-item{background:var(--bg);border-radius:12px;padding:8px 12px;margin-bottom:6px;font-size:14px}
    .comment-item strong{color:var(--orange)}
    .comment-t{font-size:11px;color:var(--text2);margin-top:2px}

    /* CONTACTS */
    .contact-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:background .15s;font-size:14px}
    .contact-item:hover{background:var(--bg)}
    .contact-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:white;flex-shrink:0;position:relative}
    .online-dot{position:absolute;bottom:0;right:0;width:10px;height:10px;background:#45bd62;border-radius:50%;border:2px solid var(--card)}

    /* CHAT WINDOW */
    .chat-win{position:fixed;bottom:0;left:20px;width:320px;background:var(--card);border-radius:12px 12px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.5);display:none;flex-direction:column;z-index:1500;max-height:440px}
    .chat-win.open{display:flex}
    .chat-head{background:var(--orange);color:white;padding:11px 14px;border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
    .chat-head-left{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}
    .chat-body{flex:1;padding:12px;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column;gap:6px;min-height:80px}
    .chat-foot{padding:10px;display:flex;gap:8px;border-top:1px solid var(--border)}
    .chat-input{flex:1;background:var(--bg);border:none;border-radius:20px;padding:9px 14px;color:var(--text);font-size:14px;outline:none}
    .chat-input:focus{outline:2px solid var(--orange)}
    .chat-send-btn{background:var(--orange);color:white;border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .msg{max-width:82%;padding:8px 12px;border-radius:18px;font-size:14px;line-height:1.4;word-break:break-word}
    .msg-out{background:var(--orange);color:white;align-self:flex-start;border-bottom-left-radius:4px}
    .msg-in{background:var(--card2);color:var(--text);align-self:flex-end;border-bottom-right-radius:4px}
    .msg-time{font-size:10px;opacity:.7;margin-top:3px;text-align:left}
    .chat-mini .chat-body,.chat-mini .chat-foot{display:none}

    /* TOAST */
    .toast-box{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:10px 22px;border-radius:20px;font-size:14px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.4);pointer-events:none;opacity:0;transition:opacity .3s}
    .toast-box.show{opacity:1}

    /* CONN STATUS */
    .conn-bar{position:fixed;top:56px;left:0;right:0;text-align:center;padding:6px;font-size:13px;z-index:900;transition:all .3s}
    .conn-bar.connecting{background:#ff9800;color:white;display:block}
    .conn-bar.connected{background:#4caf50;color:white;display:block}
    .conn-bar.error{background:#f44336;color:white;display:block}

    /* LOADING */
    .spinner{text-align:center;padding:30px;color:var(--text2)}
    .spinner i{font-size:28px;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:900px){.sidebar-right{display:none}}
    @media(max-width:680px){.sidebar-left,.nav-search{display:none}.app-layout{padding:12px 0}.chat-win{left:0;right:0;width:100%}}
  </style>
</head>
<body>

<!-- AUTH -->
<div class="auth-overlay" id="auth-overlay">
  <div class="auth-box">
    <div class="auth-logo">🐴 Ponitok</div>
    <p class="auth-sub" id="auth-sub">רשת חברתית - היכנס</p>
    <div class="auth-err" id="auth-err"></div>
    <input class="auth-input" type="text" id="auth-user" placeholder="שם משתמש (ללא רווחים)" autocomplete="username">
    <input class="auth-input" type="password" id="auth-pass" placeholder="סיסמה" autocomplete="current-password" onkeypress="if(event.keyCode==13)doLogin()">
    <button class="auth-btn" onclick="doLogin()">היכנס / הירשם</button>
    <p style="color:var(--text2);font-size:12px;margin-top:14px">אין צורך בהרשמה — כנס עם שם משתמש וסיסמה</p>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" class="hidden">

  <div class="conn-bar hidden" id="conn-bar"></div>

  <nav class="navbar">
    <div class="logo">🐴 Ponitok</div>
    <div class="nav-search">
      <i class="fas fa-search" style="color:var(--text2)"></i>
      <input type="text" placeholder="חפש פוסטים..." id="search-inp" oninput="filterPosts()">
    </div>
    <div class="nav-icons">
      <button class="nav-btn" title="הודעות" onclick="toggleChatPanel()"><i class="fas fa-comment-dots"></i></button>
      <div class="nav-avatar" id="nav-av" title="פרופיל">?</div>
      <button class="nav-btn" onclick="doLogout()" title="יציאה"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </nav>

  <div class="app-layout">
    <!-- LEFT SIDEBAR -->
    <aside class="sidebar-left">
      <div class="sidebar-card">
        <div class="sidebar-item active"><i class="fas fa-home"></i> דף הבית</div>
        <div class="sidebar-item" onclick="showToast('בקרוב!')"><i class="fas fa-user-friends"></i> חברים</div>
        <div class="sidebar-item" onclick="showToast('בקרוב!')"><i class="fas fa-users"></i> קבוצות</div>
        <div class="sidebar-item" onclick="showToast('בקרוב!')"><i class="fas fa-video"></i> וידאו</div>
        <div class="sidebar-item" onclick="showToast('בקרוב!')"><i class="fas fa-store"></i> מרקטפלייס</div>
      </div>
    </aside>

    <!-- FEED -->
    <section class="feed">
      <div class="create-post" id="create-post">
        <div class="cp-top">
          <div class="cp-avatar" id="cp-av">?</div>
          <div class="cp-placeholder" onclick="expandPost()">מה חדש, פוני? 🐴</div>
        </div>
        <div id="cp-extra" class="hidden">
          <textarea class="cp-textarea" id="cp-text" placeholder="מה חדש, פוני? 🐴" rows="3"></textarea>
          <button class="cp-submit" onclick="publishPost()">🚀 פרסם פוסט</button>
        </div>
        <div class="cp-actions">
          <button class="cp-action photo" onclick="showToast('בקרוב!')"><i class="fas fa-image"></i> תמונה</button>
          <button class="cp-action video" onclick="showToast('בקרוב!')"><i class="fas fa-video"></i> וידאו</button>
          <button class="cp-action feel" onclick="showToast('בקרוב!')"><i class="fas fa-smile"></i> תחושה</button>
        </div>
      </div>
      <div id="posts-area"><div class="spinner"><i class="fas fa-spinner"></i><br><br>טוען פוסטים...</div></div>
    </section>

    <!-- RIGHT SIDEBAR -->
    <aside class="sidebar-right">
      <div class="sidebar-card">
        <div class="sidebar-title">משתמשים</div>
        <div id="users-list"><div style="color:var(--text2);font-size:13px;padding:8px 10px">טוען...</div></div>
      </div>
    </aside>
  </div>
</div>

<!-- CHAT -->
<div class="chat-win" id="chat-win">
  <div class="chat-head" onclick="toggleChatMinimize()">
    <div class="chat-head-left">
      <i class="fas fa-comment-dots"></i>
      <span id="chat-with-name">צ'אט</span>
    </div>
    <button onclick="closeChat(event)" style="background:none;border:none;color:white;font-size:16px;cursor:pointer"><i class="fas fa-times"></i></button>
  </div>
  <div class="chat-body" id="chat-body">
    <div style="text-align:center;color:var(--text2);font-size:13px;padding:20px">בחר משתמש לצ'אט</div>
  </div>
  <div class="chat-foot">
    <input class="chat-input" id="chat-inp" placeholder="כתוב הודעה..." onkeypress="if(event.keyCode==13)sendMsg()">
    <button class="chat-send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
  </div>
</div>

<div class="toast-box" id="toast"></div>

<!-- MQTT -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
// ===== CONFIG =====
const NS = 'ponitok_v1_2026';
const BROKER = 'wss://broker.hivemq.com:8884/mqtt';

// ===== MQTT ADAPTER (same as Watspp) =====
let _mqttClient = null;
const _subs = {};

function initMQTT(onConnected) {
  setConn('connecting');
  _mqttClient = mqtt.connect(BROKER, {
    clientId: 'ponitok_' + Math.random().toString(16).slice(2,10),
    keepalive: 60, reconnectPeriod: 3000, connectTimeout: 15000
  });
  _mqttClient.on('connect', () => {
    setConn('connected');
    Object.keys(_subs).forEach(t => _mqttClient.subscribe(t, {qos:1}));
    if (onConnected) { onConnected(); onConnected = null; }
  });
  _mqttClient.on('error', () => setConn('error'));
  _mqttClient.on('offline', () => setConn('connecting'));
  _mqttClient.on('message', (topic, payload) => {
    let data; try { data = JSON.parse(payload.toString()); } catch(e) { return; }
    const parts = topic.split('/');
    const key = parts[parts.length-1];
    const wc = parts.slice(0,-1).join('/') + '/+';
    if (_subs[topic]) _subs[topic].slice().forEach(h => h(data, key));
    if (_subs[wc]) _subs[wc].slice().forEach(h => h(data, key));
  });
}

function mqttSub(topic, handler) {
  if (!_subs[topic]) { _subs[topic] = []; if (_mqttClient) _mqttClient.subscribe(topic, {qos:1}); }
  if (!_subs[topic].includes(handler)) _subs[topic].push(handler);
}
function mqttPub(topic, data, retain=true) {
  if (!_mqttClient || !data) return;
  _mqttClient.publish(topic, JSON.stringify(data), {retain, qos:1});
}
function mqttUnsub(topic, handler) {
  if (!_subs[topic]) return;
  _subs[topic] = _subs[topic].filter(h => h !== handler);
}

function setConn(state) {
  const bar = document.getElementById('conn-bar');
  bar.className = 'conn-bar ' + state;
  if (state === 'connecting') bar.textContent = '🔄 מתחבר לשרת...';
  else if (state === 'connected') { bar.textContent = '✅ מחובר!'; setTimeout(() => bar.classList.add('hidden'), 2500); }
  else bar.textContent = '❌ שגיאת חיבור - מנסה שוב...';
}

// ===== GLOBALS =====
let currentUser = null;
let allPosts = {};
let allUsers = {};
let chatWith = null;
let chatListeners = [];

// ===== AUTH =====
function doLogin() {
  const username = document.getElementById('auth-user').value.trim().replace(/\s/g,'');
  const pass = document.getElementById('auth-pass').value;
  const errEl = document.getElementById('auth-err');
  errEl.textContent = '';
  if (!username || username.length < 2) { errEl.textContent = 'שם משתמש חייב להיות לפחות 2 תווים'; return; }
  if (!pass || pass.length < 4) { errEl.textContent = 'סיסמה חייבת להיות לפחות 4 תווים'; return; }

  // Check existing user or create new
  const userTopic = NS+'/users/'+username;
  let checked = false;
  initMQTT(() => {
    // subscribe to user profile
    const h = (data) => {
      if (checked) return; checked = true;
      mqttUnsub(userTopic, h);
      if (data && data.pass && data.pass !== pass) {
        errEl.textContent = 'סיסמה שגויה';
        document.getElementById('auth-overlay').classList.remove('hidden');
        return;
      }
      // Login success - save or update profile
      currentUser = { username, pass, joinDate: (data && data.joinDate) || Date.now() };
      mqttPub(userTopic, { username, pass, joinDate: currentUser.joinDate, lastSeen: Date.now() });
      startApp();
    };
    mqttSub(userTopic, h);
    // If no data after 4s, create new user
    setTimeout(() => {
      if (!checked) { checked = true; mqttUnsub(userTopic, h);
        currentUser = { username, pass, joinDate: Date.now() };
        mqttPub(userTopic, { username, pass, joinDate: currentUser.joinDate, lastSeen: Date.now() });
        startApp();
      }
    }, 4000);
  });
  document.getElementById('auth-err').textContent = '';
  document.querySelector('.auth-btn').textContent = 'מתחבר...';
}

function startApp() {
  document.getElementById('auth-overlay').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  const initials = currentUser.username.charAt(0).toUpperCase();
  document.getElementById('nav-av').textContent = initials;
  document.getElementById('cp-av').textContent = initials;
  document.querySelector('.auth-btn').textContent = 'היכנס / הירשם';
  // Save login
  localStorage.setItem('ponitok_user', JSON.stringify({username: currentUser.username, pass: currentUser.pass}));
  loadPosts();
  loadUsers();
  // Heartbeat
  setInterval(() => mqttPub(NS+'/users/'+currentUser.username, { username: currentUser.username, pass: currentUser.pass, joinDate: currentUser.joinDate, lastSeen: Date.now() }), 20000);
}

function doLogout() {
  currentUser = null;
  localStorage.removeItem('ponitok_user');
  allPosts = {}; allUsers = {};
  document.getElementById('main-app').classList.add('hidden');
  document.getElementById('auth-overlay').classList.remove('hidden');
  document.getElementById('posts-area').innerHTML = '<div class="spinner"><i class="fas fa-spinner"></i></div>';
  if (_mqttClient) _mqttClient.end(true);
  _mqttClient = null;
  Object.keys(_subs).forEach(k => delete _subs[k]);
}

// Auto-login
window.addEventListener('load', () => {
  const saved = localStorage.getItem('ponitok_user');
  if (saved) {
    try {
      const {username, pass} = JSON.parse(saved);
      document.getElementById('auth-user').value = username;
      document.getElementById('auth-pass').value = pass;
    } catch(e) {}
  }
});

// ===== POSTS =====
function loadPosts() {
  document.getElementById('posts-area').innerHTML = '<div class="spinner"><i class="fas fa-spinner"></i><br><br>טוען פוסטים...</div>';
  mqttSub(NS+'/posts/+', (post, key) => {
    if (!post || !post.id) return;
    allPosts[key] = post;
    renderPosts();
  });
  setTimeout(() => {
    if (Object.keys(allPosts).length === 0) {
      document.getElementById('posts-area').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2)"><i class="fas fa-pen" style="font-size:40px;color:var(--orange)"></i><br><br>אין פוסטים עדיין<br><small>היה הראשון לכתוב!</small></div>';
    }
  }, 3500);
  // Subscribe to likes and comments updates
  mqttSub(NS+'/likes/+', (data, key) => {
    // key = postId_username
    const [postId] = key.split('_');
    if (allPosts[postId]) {
      if (!allPosts[postId].likedBy) allPosts[postId].likedBy = {};
      allPosts[postId].likedBy[key] = data;
      renderPosts();
    }
  });
}

function renderPosts() {
  const q = (document.getElementById('search-inp').value||'').toLowerCase();
  let posts = Object.values(allPosts).sort((a,b) => b.ts - a.ts);
  if (q) posts = posts.filter(p => (p.text||'').toLowerCase().includes(q) || (p.author||'').toLowerCase().includes(q));
  if (!posts.length) {
    document.getElementById('posts-area').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2)"><i class="fas fa-pen" style="font-size:40px;color:var(--orange)"></i><br><br>אין פוסטים</div>';
    return;
  }
  document.getElementById('posts-area').innerHTML = posts.map(p => buildPost(p)).join('');
}

function buildPost(p) {
  const init = (p.author||'?').charAt(0).toUpperCase();
  const t = timeAgo(p.ts);
  const likedBy = p.likedBy || {};
  const likeCount = Object.keys(likedBy).length;
  const myLikeKey = p.id + '_' + currentUser.username;
  const liked = !!likedBy[myLikeKey];
  return `<div class="post" id="post-${p.id}">
    <div class="post-header">
      <div class="post-av">${init}</div>
      <div>
        <div class="post-author">${esc(p.author)}</div>
        <div class="post-time"><i class="fas fa-globe-americas"></i> ${t}</div>
      </div>
    </div>
    <div class="post-body">${esc(p.text)}</div>
    <div class="post-stats">
      <span><i class="fas fa-thumbs-up" style="color:var(--orange)"></i> ${likeCount}</span>
      <span id="cc-${p.id}">0 תגובות</span>
    </div>
    <div class="post-footer">
      <button class="post-btn ${liked?'liked':''}" onclick="toggleLike('${p.id}')"><i class="fas fa-thumbs-up"></i> לייק</button>
      <button class="post-btn" onclick="toggleComments('${p.id}')"><i class="fas fa-comment"></i> תגובה</button>
      <button class="post-btn" onclick="sharePost('${p.id}')"><i class="fas fa-share"></i> שיתוף</button>
    </div>
    <div class="comments-box" id="cmts-${p.id}" style="display:none">
      <div class="comment-row">
        <div class="contact-av" style="width:32px;height:32px;font-size:13px">${init}</div>
        <input class="comment-input" placeholder="כתוב תגובה..." onkeypress="if(event.keyCode==13)addComment('${p.id}',this)">
      </div>
      <div id="clist-${p.id}"><div style="color:var(--text2);font-size:13px">טוען תגובות...</div></div>
    </div>
  </div>`;
}

function expandPost() {
  document.getElementById('cp-extra').classList.remove('hidden');
  document.getElementById('cp-text').focus();
}
document.addEventListener('click', e => {
  if (!e.target.closest('#create-post')) document.getElementById('cp-extra').classList.add('hidden');
});

function publishPost() {
  const text = document.getElementById('cp-text').value.trim();
  if (!text) { showToast('כתוב משהו קודם'); return; }
  const id = Date.now() + '_' + currentUser.username;
  const post = { id, author: currentUser.username, text, ts: Date.now(), likedBy: {} };
  mqttPub(NS+'/posts/'+id, post);
  allPosts[id] = post;
  document.getElementById('cp-text').value = '';
  document.getElementById('cp-extra').classList.add('hidden');
  renderPosts();
  showToast('הפוסט פורסם! 🎉');
}

function toggleLike(postId) {
  const myKey = postId + '_' + currentUser.username;
  const likedBy = allPosts[postId]?.likedBy || {};
  if (likedBy[myKey]) {
    mqttPub(NS+'/likes/'+myKey, null, false);
    delete likedBy[myKey];
  } else {
    const d = { username: currentUser.username, ts: Date.now() };
    mqttPub(NS+'/likes/'+myKey, d);
    likedBy[myKey] = d;
  }
  if (allPosts[postId]) { allPosts[postId].likedBy = likedBy; renderPosts(); }
}

const _openComments = {};
const _cmtSubs = {};

function toggleComments(postId) {
  const el = document.getElementById('cmts-'+postId);
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  if (!isOpen && !_cmtSubs[postId]) {
    _cmtSubs[postId] = true;
    const cmts = {};
    mqttSub(NS+'/comments/'+postId+'/+', (cmt, key) => {
      if (!cmt || !cmt.text) return;
      cmts[key] = cmt;
      const list = document.getElementById('clist-'+postId);
      if (!list) return;
      const sorted = Object.values(cmts).sort((a,b) => a.ts-b.ts);
      const cc = document.getElementById('cc-'+postId);
      if (cc) cc.textContent = sorted.length + ' תגובות';
      list.innerHTML = sorted.map(c =>
        `<div class="comment-item"><strong>${esc(c.author)}</strong> ${esc(c.text)}<div class="comment-t">${timeAgo(c.ts)}</div></div>`
      ).join('');
    });
  }
}

function addComment(postId, input) {
  const text = input.value.trim(); if (!text) return;
  const cid = Date.now()+'_'+currentUser.username;
  mqttPub(NS+'/comments/'+postId+'/'+cid, { id:cid, author:currentUser.username, text, ts:Date.now(), postId });
  input.value = '';
}

function sharePost(postId) { showToast('🔗 קישור הועתק!'); }
function filterPosts() { renderPosts(); }

// ===== USERS =====
function loadUsers() {
  mqttSub(NS+'/users/+', (data, key) => {
    if (!data || !data.username) return;
    allUsers[key] = data;
    renderUsers();
  });
}

function renderUsers() {
  const el = document.getElementById('users-list');
  const users = Object.values(allUsers).filter(u => u.username !== currentUser.username).slice(0,15);
  if (!users.length) { el.innerHTML = '<div style="color:var(--text2);font-size:13px;padding:8px 10px">אין משתמשים עדיין</div>'; return; }
  const now = Date.now();
  el.innerHTML = users.map(u => {
    const online = u.lastSeen && now - u.lastSeen < 60000;
    const init = (u.username||'?').charAt(0).toUpperCase();
    return `<div class="contact-item" onclick="openChatWith('${esc(u.username)}')">
      <div class="contact-av">${init}${online?'<div class="online-dot"></div>':''}</div>
      <div style="flex:1;font-size:14px">${esc(u.username)}</div>
      ${online?'<i class="fas fa-circle" style="color:#45bd62;font-size:8px"></i>':''}
    </div>`;
  }).join('');
}

// ===== CHAT =====
function getChatId(a, b) { return [a,b].sort().join('__'); }

function openChatWith(username) {
  chatWith = username;
  document.getElementById('chat-with-name').textContent = username;
  document.getElementById('chat-win').classList.add('open');
  document.getElementById('chat-win').classList.remove('chat-mini');
  loadChatMsgs();
}

function toggleChatPanel() {
  if (!chatWith) { showToast('בחר משתמש מהרשימה'); return; }
  document.getElementById('chat-win').classList.toggle('open');
}

function closeChat(e) {
  if(e) e.stopPropagation();
  document.getElementById('chat-win').classList.remove('open');
}

function toggleChatMinimize() {
  document.getElementById('chat-win').classList.toggle('chat-mini');
}

let _chatMsgs = {};
let _chatSubbed = null;

function loadChatMsgs() {
  if (!chatWith) return;
  const chatId = getChatId(currentUser.username, chatWith);
  const body = document.getElementById('chat-body');
  _chatMsgs = {};
  body.innerHTML = '<div style="text-align:center;color:var(--text2);font-size:13px;padding:20px">טוען הודעות...</div>';

  if (_chatSubbed) { mqttUnsub(NS+'/chats/'+_chatSubbed+'/+', _chatHandler); }
  _chatSubbed = chatId;
  mqttSub(NS+'/chats/'+chatId+'/+', _chatHandler);
  setTimeout(() => {
    if (Object.keys(_chatMsgs).length === 0) {
      body.innerHTML = '<div style="text-align:center;color:var(--text2);font-size:13px;padding:20px">שלח הודעה ראשונה! 👋</div>';
    }
  }, 2500);
}

function _chatHandler(msg, key) {
  if (!msg || !msg.text) return;
  _chatMsgs[key] = msg;
  const body = document.getElementById('chat-body');
  if (!body) return;
  const sorted = Object.values(_chatMsgs).sort((a,b) => a.ts-b.ts);
  body.innerHTML = sorted.map(m => {
    const isOut = m.sender === currentUser.username;
    return `<div class="msg ${isOut?'msg-out':'msg-in'}">${esc(m.text)}<div class="msg-time">${timeAgo(m.ts)}</div></div>`;
  }).join('');
  body.scrollTop = body.scrollHeight;
}

function sendMsg() {
  if (!chatWith) return;
  const inp = document.getElementById('chat-inp');
  const text = inp.value.trim(); if (!text) return;
  const chatId = getChatId(currentUser.username, chatWith);
  const msgId = Date.now()+'_'+currentUser.username;
  mqttPub(NS+'/chats/'+chatId+'/'+msgId, { id:msgId, sender:currentUser.username, receiver:chatWith, text, ts:Date.now() });
  inp.value = '';
}

// ===== UTILS =====
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function timeAgo(ts) {
  if (!ts) return '';
  const s = Math.floor((Date.now()-ts)/1000);
  if (s < 60) return 'עכשיו';
  if (s < 3600) return `לפני ${Math.floor(s/60)} דק'`;
  if (s < 86400) return `לפני ${Math.floor(s/3600)} שע'`;
  if (s < 604800) return `לפני ${Math.floor(s/86400)} ימים`;
  return new Date(ts).toLocaleDateString('he-IL');
}

let _toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastT); _toastT = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
